<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical vs Quantum Search Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
    font-family:Arial, sans-serif;
}

.section-card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.locker-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.locker{
    aspect-ratio:1;
    border-radius:15px;
    background:#6c757d;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    position:relative;
    transition:0.5s;
}

.locker.fade{
    opacity:0.2;
    transform:scale(0.9);
}

.locker.active{
    background:#0d6efd;
    transform:scale(1.08);
}

.locker.correct{
    background:#ffc107;
    color:black;
    animation:pulse 0.8s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

.person{
    font-size:50px;
    transition:0.5s;
}

.drone{
    position:absolute;
    font-size:26px;
    pointer-events:none;
}

.trail{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(13,110,253,0.4);
    animation:fadeTrail 0.8s forwards;
}

@keyframes fadeTrail{
    from{
        opacity:1;
        transform:scale(1);
    }
    to{
        opacity:0;
        transform:scale(3);
    }
}

.prize{
    font-size:50px;
    display:none;
    animation:pop 1s infinite alternate;
}

@keyframes pop{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}

.status{
    font-weight:bold;
    min-height:30px;
}

@media(max-width:576px){
    .locker{
        font-size:18px;
    }

    .person{
        font-size:40px;
    }
}
</style>
</head>

<body>

<div class="container py-4">

    <div class="text-center">
        <h1 class="fw-bold">🔐 Classical vs Quantum Search</h1>
        <p class="lead">
            Which method finds the prize locker faster?
        </p>

        <button class="btn btn-primary btn-lg" onclick="startDemo()">
            ▶ Start Demonstration
        </button>
    </div>

    <div class="row">

        <!-- Classical -->
        <div class="col-lg-6">
            <div class="section-card">

                <h3 class="text-center">
                    🚶 Classical Search
                </h3>

                <p class="text-center">
                    Checks lockers one by one.
                </p>

                <div class="text-center person" id="person">
                    🚶
                </div>

                <div class="locker-grid" id="classicalGrid"></div>

                <div class="text-center mt-3 status" id="classicalStatus">
                    Waiting...
                </div>

                <div class="text-center mt-2 prize" id="classicalPrize">
                    🎁
                </div>

            </div>
        </div>

        <!-- Quantum -->
        <div class="col-lg-6">
            <div class="section-card">

                <h3 class="text-center">
                    🤖 Quantum Search
                </h3>

                <p class="text-center">
                    Many quantum possibilities explore together.
                </p>

                <div style="position:relative">

                    <div class="locker-grid" id="quantumGrid"></div>

                    <div id="trailContainer"></div>

                </div>

                <div class="text-center mt-3 status" id="quantumStatus">
                    Waiting...
                </div>

                <div class="text-center mt-2 prize" id="quantumPrize">
                    🎁
                </div>

            </div>
        </div>

    </div>

</div>

<script>
const lockerCount = 16;
const correctLocker = 11;

const classicalGrid = document.getElementById("classicalGrid");
const quantumGrid = document.getElementById("quantumGrid");

function createGrid(grid, prefix){

    grid.innerHTML = "";

    for(let i=0;i<lockerCount;i++){

        const locker = document.createElement("div");

        locker.className = "locker";

        locker.id = prefix + i;

        locker.innerHTML = "🗄️";

        grid.appendChild(locker);
    }
}

createGrid(classicalGrid,"c");
createGrid(quantumGrid,"q");

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

async function classicalSearch(){

    document.getElementById("classicalStatus").innerText =
        "Searching one locker at a time...";

    document.getElementById("classicalPrize").style.display = "none";

    for(let i=0;i<lockerCount;i++){

        const locker = document.getElementById("c"+i);

        locker.classList.add("active");

        document.getElementById("person").innerText =
            "🚶➡️ Locker " + (i+1);

        await sleep(700);

        if(i===correctLocker){

            locker.classList.remove("active");
            locker.classList.add("correct");

            document.getElementById("classicalStatus").innerText =
                "Prize Found in Locker " + (i+1);

            document.getElementById("classicalPrize").style.display =
                "inline-block";

            locker.innerHTML = "🎁";

            break;

        }else{

            locker.classList.remove("active");
            locker.classList.add("fade");
        }
    }
}

async function quantumSearch(){

    document.getElementById("quantumStatus").innerText =
        "Quantum drones explore all possibilities...";

    document.getElementById("quantumPrize").style.display = "none";

    const trailContainer =
        document.getElementById("trailContainer");

    trailContainer.innerHTML = "";

    for(let i=0;i<lockerCount;i++){

        const locker =
            document.getElementById("q"+i);

        locker.classList.add("active");

        const trail =
            document.createElement("div");

        trail.className = "trail";

        const rect =
            locker.getBoundingClientRect();

        const parent =
            quantumGrid.getBoundingClientRect();

        trail.style.left =
            (rect.left-parent.left+30)+"px";

        trail.style.top =
            (rect.top-parent.top+30)+"px";

        trailContainer.appendChild(trail);

        locker.innerHTML = "🤖";
    }

    await sleep(1200);

    document.getElementById("quantumStatus").innerText =
        "Wrong answers interfere and fade away...";

    for(let i=0;i<lockerCount;i++){

        const locker =
            document.getElementById("q"+i);

        if(i!==correctLocker){

            locker.classList.remove("active");
            locker.classList.add("fade");
        }
    }

    await sleep(1200);

    document.getElementById("quantumStatus").innerText =
        "Correct locker is amplified!";

    const winner =
        document.getElementById("q"+correctLocker);

    winner.classList.remove("fade");
    winner.classList.remove("active");

    winner.classList.add("correct");

    winner.innerHTML = "🎯";

    await sleep(1500);

    winner.innerHTML = "🎁";

    document.getElementById("quantumPrize").style.display =
        "inline-block";

    document.getElementById("quantumStatus").innerText =
        "Prize Found with Quantum Amplification!";
}

async function startDemo(){

    createGrid(classicalGrid,"c");
    createGrid(quantumGrid,"q");

    document.getElementById("person").innerText = "🚶";

    document.getElementById("classicalStatus").innerText =
        "Starting...";

    document.getElementById("quantumStatus").innerText =
        "Starting...";

    document.getElementById("classicalPrize").style.display =
        "none";

    document.getElementById("quantumPrize").style.display =
        "none";

    classicalSearch();

    quantumSearch();
}
</script>

</body>
</html>
